# clusterprofiler.yaml — clusterProfiler R package
platform: clusterprofiler
version: "0.1"
status: skeleton

schema:
  class: gseaResult                # SAME class name as enrichit!
  type: S4

result_fields:
  pathway_id: "ID"
  pathway_desc: "Description"
  set_size: "setSize"
  enrichment_score: "enrichmentScore"
  nes: "NES"
  pvalue: "pvalue"
  fdr: "p.adjust"
  qvalue: "qvalues"                # NOTE: qvalues (plural)
  leading_edge_pct: "leading_edge"
  core_enrichment: "core_enrichment"

detection:
  class_chain: ["gseaResult"]
  distinguishing: "has @organism field"
  r_snippet: |
    obj <- readRDS(path)
    inherits(obj, "gseaResult") && !is.null(obj@organism) && nzchar(obj@organism)

notes:
  - "Same class name as enrichit — distinguish by @organism"
  - "qvalue field is 'qvalues' (plural) — different from enrichit"
