# fgsea.yaml — fgsea R package
platform: fgsea
version: "0.1"
status: skeleton

schema:
  class: list
  type: S3

result_fields:
  pathway_id: "pathway"
  pathway_desc: null                # fgsea has no description column
  set_size: "size"
  enrichment_score: "ES"            # NOTE: ES not enrichmentScore
  nes: "NES"
  pvalue: "pval"                    # NOTE: pval not pvalue
  fdr: "padj"                       # NOTE: padj not p.adjust
  qvalue: null
  leading_edge_pct: null
  core_enrichment: null             # extract from leadingEdge list
  leading_edge: "leadingEdge"       # list, not string

detection:
  class_chain: ["list"]
  r_snippet: |
    obj <- readRDS(path)
    is.list(obj) && all(c("pathway","NES","padj","ES") %in% names(obj))

notes:
  - "Field names DIFFER from enrichit/clusterProfiler (ES/pval/padj)"
  - "leadingEdge is a list of character vectors, not a string"
  - "No Collection metadata"
